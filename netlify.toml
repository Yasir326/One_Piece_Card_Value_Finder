[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/pricecharting/search"
  to = "/.netlify/functions/pricecharting-search"
  status = 200

[[redirects]]
  from = "/api/pricecharting/top-japanese"
  to = "/.netlify/functions/pricecharting-top-japanese"
  status = 200

[[redirects]]
  from = "/api/graded-prices"
  to = "/.netlify/functions/graded-prices"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
